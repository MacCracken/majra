name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        run: |
          CYRIUS_VERSION="${CYRIUS_VERSION:-$(grep -E '^cyrius[[:space:]]*=' cyrius.cyml | sed -E 's/^cyrius[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/')}"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          CYRIUS_DIR="cyrius-$CYRIUS_VERSION-x86_64-linux"
          mkdir -p "$HOME/.cyrius/bin" "$HOME/.cyrius/lib"
          cp "$CYRIUS_DIR/bin/"* "$HOME/.cyrius/bin/" 2>/dev/null || true
          cp "$CYRIUS_DIR/scripts/cyrius" "$HOME/.cyrius/bin/cyrius" 2>/dev/null || true
          cp -r "$CYRIUS_DIR/lib/"* "$HOME/.cyrius/lib/" 2>/dev/null || true
          chmod +x "$HOME/.cyrius/bin/"* 2>/dev/null || true
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH
          echo "CYRIUS_HOME=$HOME/.cyrius" >> $GITHUB_ENV

      - name: Manifest completeness ([lib] modules ⊇ main.cyr src/ includes)
        run: |
          # Every `include "src/<file>.cyr"` in src/main.cyr must be listed under
          # cyrius.cyml [lib] modules. Otherwise `cyrius distlib` silently ships
          # dist/majra.cyr missing a module, and the freshness gate below can't
          # see it (manifest is both input and oracle). Mirrors libro's guard.
          INCLUDES=$(grep -E 'include "src/[^"]+\.cyr"' src/main.cyr \
            | sed -E 's/.*"(src\/[^"]+\.cyr)".*/\1/' | sort -u)
          MANIFEST=$(awk '/^\[lib\]/{flag=1;next} /^\[/{flag=0} flag' cyrius.cyml \
            | grep -oE '"src/[^"]+\.cyr"' | tr -d '"' | sort -u)
          MISSING=$(comm -23 <(echo "$INCLUDES") <(echo "$MANIFEST"))
          if [ -n "$MISSING" ]; then
            echo "FAIL: src/ files included from main.cyr but not in cyrius.cyml [lib] modules:"
            echo "$MISSING"
            exit 1
          fi
          echo "Manifest covers all main.cyr src/ includes."

      - name: Build
        run: |
          mkdir -p build
          cyrius build src/main.cyr build/majra
          echo "majra: $(wc -c < build/majra) bytes"

      - name: Verify ELF
        run: xxd -l 4 build/majra | grep -q "7f45 4c46"

      - name: Core tests
        run: ./build/majra

      - name: Expanded tests
        run: |
          cyrius build tests/test_core.tcyr build/test_core
          ./build/test_core

      - name: Backend tests
        run: |
          cyrius build tests/test_backends.tcyr build/test_backends
          ./build/test_backends

      - name: Fuzz
        run: |
          for f in fuzz/*.fcyr; do
            name=$(basename "$f" .fcyr)
            cyrius build "$f" "build/$name"
            timeout 10 "build/$name" 500 || { echo "FUZZ CRASH: $name"; exit 1; }
            echo "  $name: ok"
          done

      - name: Benchmarks
        run: |
          for f in benches/*.bcyr; do
            name=$(basename "$f" .bcyr)
            cyrius build "$f" "build/$name"
            "build/$name"
          done

      - name: Examples
        run: |
          cyrius build examples/managed_queue.cyr build/managed_queue
          ./build/managed_queue
          cyrius build examples/pubsub_tiers.cyr build/pubsub_tiers
          ./build/pubsub_tiers

      - name: dist/majra.cyr is up-to-date
        run: |
          # `cyrius distlib` emits dist/majra.cyr from [lib] modules. The
          # self-compile check will warn about stdlib symbols (e.g.
          # CLOCK_MONOTONIC from lib/syscalls.cyr) — consumers supply their
          # own stdlib. The bundle is still emitted. Same pattern as libro
          # (see DEPS-PATTERN.md in libro for the full rationale).
          cyrius distlib || true
          cyrius distlib backends || true
          test -s dist/majra.cyr          || { echo "FAIL: dist/majra.cyr not produced"; exit 1; }
          test -s dist/majra-backends.cyr || { echo "FAIL: dist/majra-backends.cyr not produced"; exit 1; }
          if ! git diff --exit-code dist/; then
            echo "FAIL: dist/ bundles are stale. Run 'cyrius distlib && cyrius distlib backends' and commit."
            exit 1
          fi

  live-tests:
    name: Live Integration Tests
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: majra
          POSTGRES_DB: majra
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        run: |
          CYRIUS_VERSION="${CYRIUS_VERSION:-$(grep -E '^cyrius[[:space:]]*=' cyrius.cyml | sed -E 's/^cyrius[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/')}"
          curl -sLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          CYRIUS_DIR="cyrius-$CYRIUS_VERSION-x86_64-linux"
          mkdir -p "$HOME/.cyrius/bin" "$HOME/.cyrius/lib"
          cp "$CYRIUS_DIR/bin/"* "$HOME/.cyrius/bin/" 2>/dev/null || true
          cp "$CYRIUS_DIR/scripts/cyrius" "$HOME/.cyrius/bin/cyrius" 2>/dev/null || true
          cp -r "$CYRIUS_DIR/lib/"* "$HOME/.cyrius/lib/" 2>/dev/null || true
          chmod +x "$HOME/.cyrius/bin/"* 2>/dev/null || true
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH

      - name: Configure PostgreSQL auth
        run: |
          PGID=$(docker ps -q --filter "ancestor=postgres:16-alpine")
          docker exec "$PGID" su postgres -c \
            "echo 'host all all 0.0.0.0/0 password' > /var/lib/postgresql/data/pg_hba.conf && \
             echo 'local all all trust' >> /var/lib/postgresql/data/pg_hba.conf && \
             pg_ctl reload -D /var/lib/postgresql/data"

      - name: Run live tests
        run: |
          mkdir -p build
          cyrius build tests/test_live.tcyr build/test_live
          ./build/test_live

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for dangerous patterns
        run: |
          WARN=0
          if grep -rn 'syscall(59' src/ 2>/dev/null | grep -v "# "; then
            echo "WARN: raw execve"; WARN=1
          fi
          if grep -rn '"/etc/' src/ 2>/dev/null; then
            echo "WARN: hardcoded /etc paths"; WARN=1
          fi
          echo "security scan complete (warnings: $WARN)"

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required docs
        run: |
          MISSING=0
          for doc in README.md CHANGELOG.md CLAUDE.md CONTRIBUTING.md SECURITY.md CODE_OF_CONDUCT.md LICENSE VERSION cyrius.cyml; do
            if [ -f "$doc" ]; then echo "  OK: $doc"; else echo "  MISSING: $doc"; MISSING=1; fi
          done
          exit $MISSING
      - name: Verify version consistency
        run: |
          FILE_VERSION=$(tr -d '[:space:]' < VERSION)
          CYML_VERSION=$(grep '^version = ' cyrius.cyml | head -1 | sed -E 's/version = "([^"]+)".*/\1/')
          # cyrius.cyml uses ${file:VERSION} — treat the literal as "match"
          if [ "$CYML_VERSION" != '${file:VERSION}' ] && [ "$CYML_VERSION" != "$FILE_VERSION" ]; then
            echo "FAIL: VERSION ($FILE_VERSION) != cyrius.cyml ($CYML_VERSION)"
            exit 1
          fi
          grep -q "\[$FILE_VERSION\]" CHANGELOG.md || { echo "FAIL: version $FILE_VERSION not in CHANGELOG.md"; exit 1; }
          echo "Version consistent: $FILE_VERSION"
