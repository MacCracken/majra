name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # `cyrius lib sync` populates ./lib/ from the version-pinned snapshot,
  # which then shadows the global ~/.cyrius/versions/<V>/lib snapshot
  # on every subsequent `cyrius build` invocation. That's intentional
  # (the cwd lib IS the version-pinned snapshot content), but cyrius
  # emits an informational note about it on every build. Silence it
  # across all CI steps. Same pattern as agnosys CI post-5.10.x.
  CYRIUS_NO_WARN_SHADOW_LIB: "1"

  # Whole-program dead-code elimination — keeps binaries lean and
  # matches the agnosys/agnostik CI pattern.
  CYRIUS_DCE: "1"

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        # Use the upstream installer — it resolves the cyrius.cyml pin,
        # fetches the OS-matched release tarball, and lays out
        # ~/.cyrius/versions/<VERSION>/{bin,lib} (+ the active symlinks)
        # with the correct binary names. We do NOT hand-extract: the
        # compiler binary is `cycc` (the `cc5` back-compat symlink was
        # dropped at cyrius v6.1.0), and the stdlib snapshot the installer
        # lays down under versions/<V>/lib is what `cyrius lib sync` reads.
        run: |
          set -e
          CYRIUS_VERSION="$(grep -E '^cyrius[[:space:]]*=' cyrius.cyml | head -1 | sed -E 's/^cyrius[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/')"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sSf https://raw.githubusercontent.com/MacCracken/cyrius/main/scripts/install.sh | \
            CYRIUS_VERSION="$CYRIUS_VERSION" sh
          echo "$HOME/.cyrius/bin" >> "$GITHUB_PATH"
          "$HOME/.cyrius/bin/cyrius" --version

      - name: Resolve dependencies
        # Cyrius 6.x splits stdlib from git deps:
        #   `cyrius lib sync` copies the version-pinned stdlib snapshot
        #     (94 .cyr files incl slice/ct/chrono/async/sakshi/dynlib/
        #     fdlopen — the modules sigil/sandhi/agnosys reach into) into
        #     ./lib/. `cyrius deps` alone does NOT provide these toolchain
        #     modules, and a partial ./lib/ makes agnosys's slice subscript
        #     and sandhi's TLS_BACKEND_LIBSSL resolve to a `ud2` SIGILL.
        #   `cyrius deps` then overlays the [deps.sigil] git dep + writes
        #     cyrius.lock (94 entries) over the synced base.
        # Build steps below pass --no-deps so `cyrius build`'s auto-deps
        # doesn't re-resolve and perturb the synced lib's include order.
        run: |
          cyrius lib sync
          cyrius deps

      - name: Verify dep hashes
        # Skip if cyrius.lock isn't in the tree yet — first push that
        # introduces deps has to land the lockfile before this gate
        # can enforce. After it lands, enforce hash match.
        run: |
          if [ -f cyrius.lock ]; then
            cyrius deps --verify
          else
            echo "::warning::cyrius.lock not committed — skipping hash verification"
          fi

      - name: Manifest completeness ([lib] modules ⊇ main.cyr src/ includes)
        run: |
          # Every `include "src/<file>.cyr"` in src/main.cyr must be listed under
          # cyrius.cyml [lib] modules. Otherwise `cyrius distlib` silently ships
          # dist/majra.cyr missing a module, and the freshness gate below can't
          # see it (manifest is both input and oracle). Mirrors libro's guard.
          INCLUDES=$(grep -E 'include "src/[^"]+\.cyr"' src/main.cyr \
            | sed -E 's/.*"(src\/[^"]+\.cyr)".*/\1/' | sort -u)
          MANIFEST=$(awk '/^\[lib\]/{flag=1;next} /^\[/{flag=0} flag' cyrius.cyml \
            | grep -oE '"src/[^"]+\.cyr"' | tr -d '"' | sort -u)
          MISSING=$(comm -23 <(echo "$INCLUDES") <(echo "$MANIFEST"))
          if [ -n "$MISSING" ]; then
            echo "FAIL: src/ files included from main.cyr but not in cyrius.cyml [lib] modules:"
            echo "$MISSING"
            exit 1
          fi
          echo "Manifest covers all main.cyr src/ includes."

      - name: Build
        run: |
          mkdir -p build
          cyrius build --no-deps src/main.cyr build/majra
          echo "majra: $(wc -c < build/majra) bytes"

      - name: Verify ELF
        run: xxd -l 4 build/majra | grep -q "7f45 4c46"

      # aarch64 cross-build remains unwired, but the historical blocker
      # is GONE: the upstream `lib/agnosys.cyr:791` raw SYS_OPEN bug was
      # fixed long ago in agnosys mainline, and the cyrius 6.1.24 + sigil
      # 3.7.8 bump rolls the transitive agnosys pin forward to 1.3.2
      # (zero SYS_OPEN refs). Wiring the cross-build is now a verification
      # task, not a blocked-on-upstream one — deferred to a follow-up.
      # majra consumers (daimon, AgnosAI, hoosh, sutra, stiva) are all
      # x86_64-server-side, so no consumer is blocked.

      - name: Core tests
        run: ./build/majra

      - name: Expanded tests
        run: |
          cyrius build --no-deps tests/test_core.tcyr build/test_core
          ./build/test_core

      - name: Backend tests
        run: |
          cyrius build --no-deps tests/test_backends.tcyr build/test_backends
          ./build/test_backends

      - name: Patra-queue tests
        # Separate entry point — adding these assertions to
        # test_backends.tcyr blew the cyrius fixup cap on the
        # cc3 line; under cc5 there's more headroom but the
        # split entry is documented architecture.
        run: |
          cyrius build --no-deps tests/test_patra_queue.tcyr build/test_patra_queue
          ./build/test_patra_queue

      - name: Fuzz
        run: |
          for f in fuzz/*.fcyr; do
            name=$(basename "$f" .fcyr)
            cyrius build --no-deps "$f" "build/$name"
            timeout 10 "build/$name" 500 || { echo "FUZZ CRASH: $name"; exit 1; }
            echo "  $name: ok"
          done

      - name: Benchmarks
        run: |
          for f in benches/*.bcyr; do
            name=$(basename "$f" .bcyr)
            cyrius build --no-deps "$f" "build/$name"
            "build/$name"
          done

      - name: Examples
        run: |
          cyrius build --no-deps examples/managed_queue.cyr build/managed_queue
          ./build/managed_queue
          cyrius build --no-deps examples/pubsub_tiers.cyr build/pubsub_tiers
          ./build/pubsub_tiers

      - name: dist bundles are up-to-date
        # Four profile bundles need to stay in sync with src/:
        #   majra.cyr           — core engine (default [lib])
        #   majra-signed.cyr    — core + signed_envelope ([lib.signed])
        #   majra-admin.cyr     — core + admin endpoint ([lib.admin])
        #   majra-backends.cyr  — everything ([lib.backends])
        # Each `cyrius distlib <profile>` reads the matching
        # [lib.<profile>] section in cyrius.cyml. Self-compile check
        # warns about stdlib symbols (consumers supply their own
        # stdlib) — bundle still emitted; we only fail on a stale
        # diff. Mirrors libro DEPS-PATTERN.md.
        run: |
          cyrius distlib          || true
          cyrius distlib signed   || true
          cyrius distlib admin    || true
          cyrius distlib backends || true
          fail=0
          for bundle in dist/majra.cyr dist/majra-signed.cyr dist/majra-admin.cyr dist/majra-backends.cyr; do
            test -s "$bundle" || { echo "FAIL: $bundle not produced"; fail=1; continue; }
            if ! git diff --exit-code "$bundle"; then
              echo "FAIL: $bundle is stale. Run 'cyrius distlib [<profile>]' and commit."
              fail=1
            fi
          done
          [ $fail -eq 0 ] || exit 1
          echo "all 4 dist bundles match src/"

  live-tests:
    name: Live Integration Tests
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: majra
          POSTGRES_DB: majra
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        # Upstream installer — see build-and-test job for rationale.
        run: |
          set -e
          CYRIUS_VERSION="$(grep -E '^cyrius[[:space:]]*=' cyrius.cyml | head -1 | sed -E 's/^cyrius[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/')"
          curl -sSf https://raw.githubusercontent.com/MacCracken/cyrius/main/scripts/install.sh | \
            CYRIUS_VERSION="$CYRIUS_VERSION" sh
          echo "$HOME/.cyrius/bin" >> "$GITHUB_PATH"

      - name: Resolve deps
        # Cyrius 6.x: stdlib snapshot via `cyrius lib sync`, git deps via
        # `cyrius deps`. See build-and-test "Resolve dependencies".
        run: |
          cyrius lib sync
          cyrius deps

      - name: Configure PostgreSQL auth
        run: |
          PGID=$(docker ps -q --filter "ancestor=postgres:16-alpine")
          docker exec "$PGID" su postgres -c \
            "echo 'host all all 0.0.0.0/0 password' > /var/lib/postgresql/data/pg_hba.conf && \
             echo 'local all all trust' >> /var/lib/postgresql/data/pg_hba.conf && \
             pg_ctl reload -D /var/lib/postgresql/data"

      - name: Run live tests
        run: |
          mkdir -p build
          cyrius build --no-deps tests/test_live.tcyr build/test_live
          ./build/test_live

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for dangerous patterns
        run: |
          WARN=0
          if grep -rn 'syscall(59' src/ 2>/dev/null | grep -v "# "; then
            echo "WARN: raw execve"; WARN=1
          fi
          if grep -rn '"/etc/' src/ 2>/dev/null; then
            echo "WARN: hardcoded /etc paths"; WARN=1
          fi
          echo "security scan complete (warnings: $WARN)"

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required docs
        run: |
          MISSING=0
          for doc in README.md CHANGELOG.md CLAUDE.md CONTRIBUTING.md SECURITY.md CODE_OF_CONDUCT.md LICENSE VERSION cyrius.cyml; do
            if [ -f "$doc" ]; then echo "  OK: $doc"; else echo "  MISSING: $doc"; MISSING=1; fi
          done
          exit $MISSING
      - name: Verify version consistency
        run: |
          FILE_VERSION=$(tr -d '[:space:]' < VERSION)
          CYML_VERSION=$(grep '^version = ' cyrius.cyml | head -1 | sed -E 's/version = "([^"]+)".*/\1/')
          # cyrius.cyml uses ${file:VERSION} — treat the literal as "match"
          if [ "$CYML_VERSION" != '${file:VERSION}' ] && [ "$CYML_VERSION" != "$FILE_VERSION" ]; then
            echo "FAIL: VERSION ($FILE_VERSION) != cyrius.cyml ($CYML_VERSION)"
            exit 1
          fi
          grep -q "\[$FILE_VERSION\]" CHANGELOG.md || { echo "FAIL: version $FILE_VERSION not in CHANGELOG.md"; exit 1; }
          echo "Version consistent: $FILE_VERSION"
