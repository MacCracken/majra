name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        run: |
          curl -sL https://github.com/MacCracken/cyrius/releases/latest/download/cyrius-linux-x86_64.tar.gz | tar xz -C /usr/local
          echo "/usr/local/cyrius/bin" >> $GITHUB_PATH

      - name: Full audit (test + fmt + lint + vet + deny + bench)
        run: cyrius audit

      - name: Examples
        run: |
          cyrius build examples/managed_queue.cyr build/managed_queue && ./build/managed_queue
          cyrius build examples/pubsub_tiers.cyr build/pubsub_tiers && ./build/pubsub_tiers

  live-tests:
    name: Live Integration Tests
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: majra
          POSTGRES_DB: majra
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        run: |
          curl -sL https://github.com/MacCracken/cyrius/releases/latest/download/cyrius-linux-x86_64.tar.gz | tar xz -C /usr/local
          echo "/usr/local/cyrius/bin" >> $GITHUB_PATH

      - name: Configure PostgreSQL auth
        run: |
          PGID=$(docker ps -q --filter "ancestor=postgres:16-alpine")
          docker exec "$PGID" su postgres -c \
            "echo 'host all all 0.0.0.0/0 password' > /var/lib/postgresql/data/pg_hba.conf && \
             echo 'local all all trust' >> /var/lib/postgresql/data/pg_hba.conf && \
             pg_ctl reload -D /var/lib/postgresql/data"

      - name: Run live tests
        run: |
          cyrius build tests/test_live.cyr build/test_live
          ./build/test_live

  version:
    name: Version Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify VERSION matches cyrius.toml
        run: |
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          CYRIUS_VERSION=$(grep '^version = ' cyrius.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          if [ "$FILE_VERSION" != "$CYRIUS_VERSION" ]; then
            echo "ERROR: VERSION ($FILE_VERSION) != cyrius.toml ($CYRIUS_VERSION)"
            exit 1
          fi
          echo "Versions match: $FILE_VERSION"
