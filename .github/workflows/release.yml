name: Release

on:
  push:
    # Accept both `v1.2.3` and `1.2.3` tag styles. The version-verify
    # step below enforces semver shape + match against VERSION file.
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

env:
  # See ci.yml — `cyrius lib sync` populates cwd ./lib/, which shadows
  # the version-pinned snapshot (identical content); silence the note.
  CYRIUS_NO_WARN_SHADOW_LIB: "1"
  # Whole-program dead-code elimination — smaller release binary.
  CYRIUS_DCE: "1"

jobs:
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  release:
    name: Build & Release
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify version
        run: |
          FILE_VERSION=$(tr -d '[:space:]' < VERSION)
          TAG="${GITHUB_REF_NAME#v}"   # strip optional leading 'v' so v2.4.2 == 2.4.2
          echo "$TAG" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$' || {
            echo "tag ($TAG) is not semver x.y.z"; exit 1; }
          [ "$FILE_VERSION" = "$TAG" ] || {
            echo "VERSION ($FILE_VERSION) != tag ($TAG)"; exit 1; }
          grep -q '^version = "\${file:VERSION}"' cyrius.cyml || {
            echo "cyrius.cyml version must be \${file:VERSION}"; exit 1; }
          echo "Version verified: $TAG (cyrius.cyml pulls from VERSION via \${file:VERSION})"

      - name: Install Cyrius toolchain
        # Upstream installer — resolves the cyrius.cyml pin, fetches the
        # OS-matched release tarball, and lays out
        # ~/.cyrius/versions/<V>/{bin,lib} with the correct binary names
        # (`cycc`; the `cc5` symlink was dropped at cyrius v6.1.0). The
        # stdlib snapshot it installs under versions/<V>/lib is what
        # `cyrius lib sync` reads. See ci.yml for the full rationale.
        run: |
          set -e
          CYRIUS_VERSION="$(grep -E '^cyrius[[:space:]]*=' cyrius.cyml | head -1 | sed -E 's/^cyrius[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/')"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sSf https://raw.githubusercontent.com/MacCracken/cyrius/main/scripts/install.sh | \
            CYRIUS_VERSION="$CYRIUS_VERSION" sh
          echo "$HOME/.cyrius/bin" >> "$GITHUB_PATH"
          "$HOME/.cyrius/bin/cyrius" --version

      - name: Resolve deps
        # Cyrius 6.x: `cyrius lib sync` provides the version-pinned
        # stdlib snapshot (slice/ct/chrono/async/sakshi/dynlib/fdlopen —
        # the modules sigil/sandhi/agnosys reach into); `cyrius deps`
        # overlays the [deps.sigil] git dep. A bare `cyrius deps` leaves
        # a partial ./lib/ that ud2-SIGILLs. See ci.yml for detail.
        run: |
          cyrius lib sync
          cyrius deps

      - name: Verify dep hashes
        run: |
          if [ -f cyrius.lock ]; then
            cyrius deps --verify
          else
            echo "::warning::cyrius.lock not committed — skipping hash verification"
          fi

      - name: Build
        run: |
          mkdir -p build
          cyrius build --no-deps src/main.cyr build/majra
          echo "majra: $(wc -c < build/majra) bytes"

      # aarch64 cross-build intentionally skipped — see ci.yml for the
      # rationale (upstream lib/agnosys.cyr:791 SYS_OPEN bug).

      - name: Smoke test
        run: |
          ./build/majra > /tmp/majra_out 2>&1 || true
          grep -q "0 failed" /tmp/majra_out || { echo "FAIL: tests did not report 0 failed"; exit 1; }

      - name: Regenerate dist bundles (consumer distribution artifact)
        # All 4 profile bundles must ship — daimon/AgnosAI/hoosh/sutra/stiva
        # pick one of `dist/majra.cyr`, `dist/majra-signed.cyr`,
        # `dist/majra-admin.cyr`, or `dist/majra-backends.cyr` depending
        # on which surface they need. Tagged release without all four
        # = broken `cyrius deps` for any consumer on a missing profile.
        run: |
          cyrius distlib          || true
          cyrius distlib signed   || true
          cyrius distlib admin    || true
          cyrius distlib backends || true
          for bundle in dist/majra.cyr dist/majra-signed.cyr dist/majra-admin.cyr dist/majra-backends.cyr; do
            test -s "$bundle" || { echo "FAIL: $bundle not produced"; exit 1; }
            echo "$bundle: $(wc -l < "$bundle") lines, $(wc -c < "$bundle") bytes"
          done

      - name: Verify dist bundles match committed copies
        run: |
          fail=0
          for bundle in dist/majra.cyr dist/majra-signed.cyr dist/majra-admin.cyr dist/majra-backends.cyr; do
            if ! git diff --exit-code "$bundle"; then
              echo "FAIL: $bundle is stale. Regenerate via 'cyrius distlib [<profile>]' and commit."
              fail=1
            fi
          done
          [ $fail -eq 0 ] || exit 1

      - name: Clean toolchain artifacts
        run: rm -f cyrius-*.tar.gz

      - name: Archive
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          git archive --format=tar.gz --prefix="majra-${TAG}/" -o "majra-${TAG}-src.tar.gz" HEAD
          cp dist/majra.cyr          "majra-${TAG}.cyr"
          cp dist/majra-signed.cyr   "majra-${TAG}-signed.cyr"
          cp dist/majra-admin.cyr    "majra-${TAG}-admin.cyr"
          cp dist/majra-backends.cyr "majra-${TAG}-backends.cyr"
          if [ -f build/majra ]; then
            cp build/majra "majra-${TAG}-x86_64-linux"
          fi
          sha256sum majra-*.tar.gz majra-*.cyr majra-*-linux 2>/dev/null > SHA256SUMS

      - name: Extract changelog
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          awk "/^## \\[${TAG}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md > /tmp/body.md

      - uses: softprops/action-gh-release@v2
        with:
          name: "majra ${{ github.ref_name }}"
          body_path: /tmp/body.md
          prerelease: ${{ startsWith(github.ref_name, '0.') || startsWith(github.ref_name, 'v0.') }}
          files: |
            majra-*.tar.gz
            majra-*.cyr
            majra-*-linux
            cyrius.lock
            SHA256SUMS
